<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Pro - Neuro-Focus Soundscape</title>
    <style>
        :root {
            --bg-color: #050b14;
            --glass-bg: rgba(16, 25, 43, 0.6);
            --glass-border: rgba(56, 189, 248, 0.2);
            --accent: #00f0ff;
            --text: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: rgba(0, 240, 255, 0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        body {
            background: var(--bg-color); color: var(--text);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; 
            overflow-x: hidden; /* Sirf horizontal scroll hide kiya hai */
            padding: 40px 15px; /* Top aur bottom space taaki scroll karne par button na kटे */
            position: relative;
        }

        /* Matrix/Sci-Fi Pulse Background */
        .blob {
            position: fixed; /* Scroll karne par background wahi rahega */
            top: 50%; left: 50%;
            margin-top: -250px; margin-left: -250px;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(0,240,255,0.15) 0%, rgba(5,11,20,0) 70%);
            border-radius: 50%; filter: blur(60px);
            animation: breathe 6s infinite alternate ease-in-out;
            z-index: -1; opacity: 0.5; transition: opacity 2s;
        }

        .playing .blob { opacity: 1; animation: breathePulse 3s infinite alternate ease-in-out; }

        @keyframes breathe {
            0% { transform: scale(0.8); }
            100% { transform: scale(1.1); }
        }
        @keyframes breathePulse {
            0% { transform: scale(0.9); background: radial-gradient(circle, rgba(0,240,255,0.3) 0%, rgba(5,11,20,0) 70%); }
            100% { transform: scale(1.2); background: radial-gradient(circle, rgba(138,43,226,0.3) 0%, rgba(5,11,20,0) 70%); }
        }

        .container {
            background: var(--glass-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); padding: 35px; border-radius: 20px;
            width: 100%; max-width: 600px; text-align: center;
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.1); 
            position: relative;
            margin: auto;
        }

        h1 { font-size: 26px; margin-bottom: 5px; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; color: var(--accent); text-shadow: 0 0 10px rgba(0,240,255,0.5); }
        p.subtitle { font-size: 12px; color: #94a3b8; margin-bottom: 25px; letter-spacing: 1px; }

        .grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
        }
        
        @media(max-width: 600px) { 
            .grid { grid-template-columns: 1fr; gap: 15px; } 
            .container { padding: 25px 20px; }
            .buttons { flex-direction: column; } /* Mobile par buttons upar-neeche aayenge */
        }

        .control-group { text-align: left; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .control-group label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 12px; color: #cbd5e1; font-weight: 500; }
        
        input[type=range] { width: 100%; appearance: none; background: rgba(255,255,255,0.1); height: 4px; border-radius: 5px; outline: none; }
        input[type=range]::-webkit-slider-thumb { appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--accent); cursor: pointer; box-shadow: 0 0 10px var(--accent); transition: transform 0.1s; }
        input[type=range]::-webkit-slider-thumb:active { transform: scale(1.3); }

        .buttons { display: flex; gap: 15px; margin-top: 25px; }

        button {
            border: none; padding: 16px; font-size: 15px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px;
            border-radius: 10px; cursor: pointer; transition: all 0.3s ease; width: 100%;
        }

        #playBtn { flex: 2; background: transparent; color: var(--accent); border: 2px solid var(--accent); box-shadow: inset 0 0 10px rgba(0,240,255,0.2), 0 0 15px rgba(0,240,255,0.2); }
        #playBtn:hover { background: rgba(0,240,255,0.1); box-shadow: inset 0 0 20px rgba(0,240,255,0.4), 0 0 30px rgba(0,240,255,0.4); }
        #playBtn.playing { background: var(--accent); color: #000; box-shadow: 0 0 30px var(--accent); }

        #shareBtn { flex: 1; background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); }
        #shareBtn:hover { background: rgba(255,255,255,0.1); }

        /* Toast */
        #toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: var(--accent); color: #000; padding: 12px 25px; border-radius: 30px;
            font-size: 14px; font-weight: bold; opacity: 0; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); pointer-events: none; box-shadow: 0 0 20px var(--accent); z-index: 1000;
        }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    </style>
</head>
<body>

    <div class="blob"></div>

    <div class="container">
        <h1>Neural Sync</h1>
        <p class="subtitle">Advanced Brainwave & Ambient Generator</p>

        <div class="grid">
            <div class="control-group">
                <label><span>⚡ Gamma (Study Focus)</span> <span id="gammaVal">50%</span></label>
                <input type="range" id="gammaSlider" min="0" max="100" value="50">
            </div>
            
            <div class="control-group">
                <label><span>🧠 Theta (Subconscious)</span> <span id="thetaVal">50%</span></label>
                <input type="range" id="thetaSlider" min="0" max="100" value="50">
            </div>

            <div class="control-group">
                <label><span>🧘 Alpha (Stress Relief)</span> <span id="alphaVal">0%</span></label>
                <input type="range" id="alphaSlider" min="0" max="100" value="0">
            </div>

            <div class="control-group">
                <label><span>🌌 Cosmic Drone</span> <span id="droneVal">30%</span></label>
                <input type="range" id="droneSlider" min="0" max="100" value="30">
            </div>

            <div class="control-group">
                <label><span>🌧️ Cinematic Rain</span> <span id="rainVal">40%</span></label>
                <input type="range" id="rainSlider" min="0" max="100" value="40">
            </div>

            <div class="control-group">
                <label><span>🌪️ Deep Noise</span> <span id="noiseVal">0%</span></label>
                <input type="range" id="noiseSlider" min="0" max="100" value="0">
            </div>
        </div>

        <div class="buttons">
            <button id="playBtn">Initialize Sync</button>
            <button id="shareBtn">🔗 Copy Link</button>
        </div>
        
    </div>
    <div id="toast">Neural Link Copied!</div>

    <script>
        let audioCtx;
        let isPlaying = false;
        let masterGain;
        let nodes = {}; 
        
        const playBtn = document.getElementById('playBtn');
        const shareBtn = document.getElementById('shareBtn');
        const toast = document.getElementById('toast');
        
        const sliderNames = ['gamma', 'theta', 'alpha', 'drone', 'rain', 'noise'];
        const ui = {};

        sliderNames.forEach(name => {
            ui[name] = {
                slider: document.getElementById(`${name}Slider`),
                label: document.getElementById(`${name}Val`)
            };
        });

        const urlParams = new URLSearchParams(window.location.search);
        sliderNames.forEach(name => {
            if (urlParams.has(name)) {
                ui[name].slider.value = Math.min(100, Math.max(0, parseInt(urlParams.get(name))));
            }
            ui[name].label.innerText = ui[name].slider.value + '%';
        });

        function updateLevels() {
            if(isPlaying && audioCtx) {
                if(nodes.gammaGain) nodes.gammaGain.gain.setTargetAtTime((ui.gamma.slider.value/100) * 0.4, audioCtx.currentTime, 0.1);
                if(nodes.thetaGain) nodes.thetaGain.gain.setTargetAtTime((ui.theta.slider.value/100) * 0.4, audioCtx.currentTime, 0.1);
                if(nodes.alphaGain) nodes.alphaGain.gain.setTargetAtTime((ui.alpha.slider.value/100) * 0.4, audioCtx.currentTime, 0.1);
                if(nodes.droneGain) nodes.droneGain.gain.setTargetAtTime((ui.drone.slider.value/100) * 0.3, audioCtx.currentTime, 0.1);
                if(nodes.rainGain) nodes.rainGain.gain.setTargetAtTime((ui.rain.slider.value/100) * 0.6, audioCtx.currentTime, 0.1);
                if(nodes.noiseGain) nodes.noiseGain.gain.setTargetAtTime((ui.noise.slider.value/100) * 0.5, audioCtx.currentTime, 0.1);
            }
            
            let newUrl = `${window.location.origin}${window.location.pathname}?`;
            sliderNames.forEach(name => {
                ui[name].label.innerText = ui[name].slider.value + '%';
                newUrl += `${name}=${ui[name].slider.value}&`;
            });
            window.history.replaceState({}, '', newUrl.slice(0, -1));
        }

        sliderNames.forEach(name => {
            ui[name].slider.addEventListener('input', updateLevels);
        });

        function createBrainwave(baseFreq, beatFreq) {
            let osc = audioCtx.createOscillator();
            osc.type = 'sine';
            osc.frequency.value = baseFreq;
            
            let lfo = audioCtx.createOscillator();
            lfo.type = 'sine';
            lfo.frequency.value = beatFreq;
            
            let lfoGain = audioCtx.createGain();
            lfoGain.gain.value = 1; 
            
            let outputGain = audioCtx.createGain();
            
            lfo.connect(lfoGain);
            osc.connect(outputGain);
            lfoGain.connect(outputGain.gain); 
            
            osc.start();
            lfo.start();
            return outputGain;
        }

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0;
            masterGain.connect(audioCtx.destination);

            let gammaOut = createBrainwave(200, 40);
            nodes.gammaGain = audioCtx.createGain();
            gammaOut.connect(nodes.gammaGain).connect(masterGain);

            let thetaOut = createBrainwave(160, 6);
            nodes.thetaGain = audioCtx.createGain();
            thetaOut.connect(nodes.thetaGain).connect(masterGain);

            let alphaOut = createBrainwave(180, 10);
            nodes.alphaGain = audioCtx.createGain();
            alphaOut.connect(nodes.alphaGain).connect(masterGain);

            let droneOsc = audioCtx.createOscillator();
            droneOsc.type = 'triangle';
            droneOsc.frequency.value = 110; 
            nodes.droneGain = audioCtx.createGain();
            droneOsc.connect(nodes.droneGain).connect(masterGain);
            droneOsc.start();

            let bufferSize = audioCtx.sampleRate * 2;
            let noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            let output = noiseBuffer.getChannelData(0);
            let lastOut = 0;
            for (let i = 0; i < bufferSize; i++) {
                let white = Math.random() * 2 - 1;
                output[i] = (lastOut + (0.02 * white)) / 1.02; 
                lastOut = output[i];
                output[i] *= 3.5;
            }
            let noiseSource = audioCtx.createBufferSource();
            noiseSource.buffer = noiseBuffer;
            noiseSource.loop = true;

            let deepFilter = audioCtx.createBiquadFilter();
            deepFilter.type = 'lowpass';
            deepFilter.frequency.value = 300;
            nodes.noiseGain = audioCtx.createGain();
            noiseSource.connect(deepFilter).connect(nodes.noiseGain).connect(masterGain);

            let rainFilter = audioCtx.createBiquadFilter();
            rainFilter.type = 'bandpass';
            rainFilter.frequency.value = 1000;
            rainFilter.Q.value = 0.5;
            
            nodes.rainGain = audioCtx.createGain();
            
            let windLfo = audioCtx.createOscillator();
            windLfo.type = 'sine';
            windLfo.frequency.value = 0.05; 
            let windGain = audioCtx.createGain();
            windGain.gain.value = 0.3;
            windLfo.connect(windGain).connect(nodes.rainGain.gain);
            windLfo.start();

            noiseSource.connect(rainFilter).connect(nodes.rainGain).connect(masterGain);
            noiseSource.start();

            updateLevels();
        }

        playBtn.addEventListener('click', () => {
            if (!isPlaying) {
                if (!audioCtx) initAudio();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                
                masterGain.gain.setTargetAtTime(1, audioCtx.currentTime, 1); 
                
                isPlaying = true;
                playBtn.innerText = 'System Active - Stop';
                playBtn.classList.add('playing');
                document.body.classList.add('playing');
            } else {
                masterGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); 
                
                setTimeout(() => { audioCtx.suspend(); }, 1000);

                isPlaying = false;
                playBtn.innerText = 'Initialize Sync';
                playBtn.classList.remove('playing');
                document.body.classList.remove('playing');
            }
        });

        shareBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(window.location.href).then(() => {
                toast.classList.add('show');
                setTimeout(() => { toast.classList.remove('show'); }, 2500);
            });
        });
    </script>
</body>
</html>
